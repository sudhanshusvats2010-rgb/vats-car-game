<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vats Car Pro - Cyber Drift</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

<div class="game-container">
  <h1 class="glitch" data-text="VATS CAR PRO">VATS CAR PRO</h1>
  <p class="subtitle">CYBER DRIFT EDITION</p>

  <div class="stats-panel">
    <div class="stat-box">
      <span class="label">SCORE</span>
      <span id="score" class="value">0</span>
    </div>
    <div class="stat-box">
      <span class="label">BEST</span>
      <span id="highScore" class="value">0</span>
    </div>
  </div>

  <div class="canvas-wrapper">
    <canvas id="gameCanvas" width="350" height="600"></canvas>
    <div id="gameOverOverlay" class="overlay">
      <h2 class="glitch" data-text="SYSTEM FAILURE">SYSTEM FAILURE</h2>
      <button class="cyber-btn" onclick="startGame()">REBOOT SYSTEM</button>
    </div>
    <div id="startOverlay" class="overlay" style="display:flex;">
      <button class="cyber-btn" onclick="startGame()">INITIALIZE</button>
    </div>
  </div>

  <div class="mobileControls">
    <button class="control-btn" id="leftBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <button class="control-btn nitro" id="nitroBtn">
      <span>⚡ BOOST</span>
    </button>
    <button class="control-btn" id="rightBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
    </button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
